# ==========================================================
# Hyprlock Configuration - Dashboard Edition (Pixel Perfect)
# ==========================================================

source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    disable_loading_bar = true
    hide_cursor = false
}

background {
    monitor = 
    path = ~/.config/omarchy/current/theme/scripts/catppuccin-blurred.png
    blur_passes = 3
    contrast = 1.0
    brightness = 0.5
    vibrancy = 0.2
}

# --- CLOCK (Hour:Minute) ---
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(202, 211, 245, 1.0)
    font_size = 100
    font_family = JetBrainsMono Nerd Font Thin
    position = 0, 340
    halign = center
    valign = center
}

# --- DATE ---
label {
    monitor = 
    text = cmd[update:3600000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(183, 189, 248, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Light
    position = 0, 225
    halign = center
    valign = center
}

# --- PROFILE PICTURE ---
image {
    monitor = 
    path = ~/.config/omarchy/current/theme/scripts/Profile.png
    size = 180 
    rounding = 45 
    border_size = 4
    border_color = rgba(198, 160, 246, 1.0)
    position = 0, 50
    halign = center
    valign = center
}

# --- USER GREETING ---
label {
    monitor = 
    text = Welcome back, <span foreground='##c6a0f6'>$USER</span>
    color = rgba(202, 211, 245, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -110
    halign = center
    valign = center
}

# --- INPUT FIELD (Password) ---
input-field {
    monitor = 
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(198, 160, 246, 1.0) 
    inner_color = rgba(30, 32, 48, 0.6)
    font_color = rgba(202, 211, 245, 1.0)
    check_color = rgba(166, 218, 149, 1.0) 
    fail_color = rgba(237, 135, 150, 1.0) 
    placeholder_text = <span foreground="##cad3f599">Enter Password...</span>
    hide_input = false
    rounding = 15
    position = 0, -210
    halign = center
    valign = center
}

# --- MUSIC BOX (Middle) ---
label {
    monitor = 
    text = cmd[update:200] bash ~/.config/omarchy/current/theme/scripts/music.sh
    color = rgba(202, 211, 245, 1.0)
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, -280
    halign = center
    valign = center
}

# --- COLORFUL POWER MENU (Fine-Tuned Alignment) ---

# Suspend
label {
    monitor = 
    text = ㅤ󰤄ㅤ
    color = rgba(238, 212, 159, 1.0)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    onclick = systemctl suspend
    position = -130, 110
    halign = center
    valign = bottom
}
label {
    monitor = 
    text = Suspendㅤ
    color = rgba(202, 211, 245, 0.8)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = -135, 65
    halign = center
    valign = bottom
}

# Power off
label {
    monitor = 
    text = ㅤ󰐥ㅤ
    color = rgba(237, 135, 150, 1.0)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    onclick = poweroff 
    position = -5, 110
    halign = center
    valign = bottom
}
label {
    monitor = 
    text = Power Offㅤ
    color = rgba(202, 211, 245, 0.8)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 65
    halign = center
    valign = bottom
}

# Reboot
label {
    monitor = 
    text = ㅤ󰜉ㅤ
    color = rgba(166, 218, 149, 1.0)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    onclick = reboot
    position = 130, 110
    halign = center
    valign = bottom
}
label {
    monitor = 
    text = Rebootㅤ
    color = rgba(202, 211, 245, 0.8)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 135, 65
    halign = center
    valign = bottom
}